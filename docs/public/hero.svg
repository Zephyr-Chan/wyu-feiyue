<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B2346;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#C45C7A;stop-opacity:0.6" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2E86AB;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#8B2346;stop-opacity:0.4" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="200" cy="200" r="180" fill="url(#grad1)" opacity="0.15"/>
  <circle cx="200" cy="200" r="140" fill="url(#grad2)" opacity="0.1"/>
  <!-- Flying geese (simplified) -->
  <g transform="translate(80, 120)" fill="#8B2346" opacity="0.9">
    <path d="M0,40 Q20,10 60,0 Q40,20 50,40 Z"/>
    <path d="M55,50 Q75,20 115,10 Q95,30 105,50 Z" opacity="0.7"/>
    <path d="M110,55 Q130,25 170,15 Q150,35 160,55 Z" opacity="0.5"/>
    <path d="M165,50 Q185,20 225,10 Q205,30 215,50 Z" opacity="0.35"/>
    <path d="M220,45 Q240,15 280,5 Q260,25 270,45 Z" opacity="0.2"/>
  </g>
  <!-- Book/Document icon -->
  <g transform="translate(130, 200)" fill="none" stroke="#8B2346" stroke-width="2" opacity="0.6">
    <rect x="0" y="0" width="140" height="100" rx="8" fill="white" fill-opacity="0.8"/>
    <line x1="30" y1="25" x2="110" y2="25" stroke-width="2"/>
    <line x1="30" y1="45" x2="100" y2="45" stroke-width="2"/>
    <line x1="30" y1="65" x2="90" y2="65" stroke-width="2"/>
    <circle cx="20" cy="25" r="4" fill="#8B2346"/>
    <circle cx="20" cy="45" r="4" fill="#C45C7A"/>
    <circle cx="20" cy="65" r="4" fill="#2E86AB"/>
  </g>
  <!-- Globe icon -->
  <g transform="translate(250, 160)" fill="none" stroke="#2E86AB" stroke-width="1.5" opacity="0.5">
    <circle cx="30" cy="30" r="25"/>
    <ellipse cx="30" cy="30" rx="12" ry="25"/>
    <line x1="5" y1="30" x2="55" y2="30"/>
    <path d="M8,18 Q30,15 52,18" />
    <path d="M8,42 Q30,45 52,42" />
  </g>
  <!-- Text: WYU -->
  <text x="200" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#8B2346" opacity="0.8">WYU</text>
  <text x="200" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#666" opacity="0.6">FEIYUE HANDBOOK</text>
</svg>
